version: "3.7"

services:
  # This service runs the gRPC server that loads your user code, in both dagit
  # and dagster-daemon. By setting DAGSTER_CURRENT_IMAGE to its own image, we tell the
  # run launcher to use this same image when launching runs in a new container as well.
  # Multiple containers like this can be deployed separately - each just needs to run on
  # its own port, and have its own entry in the workspace.yaml file that's loaded by dagit.
  dagster_user_code:
    build:
      context: .
      dockerfile: ./container/user_code/Dockerfile
    container_name: dagster_user_code
    image: dagster_user_code_image
    restart: always
    environment:
      DAGSTER_POSTGRES_USER: "dagster"
      DAGSTER_POSTGRES_PASSWORD: "dagster"
      DAGSTER_POSTGRES_DB: "dep"
      DAGSTER_POSTGRES_HOSTNAME: "dep-db"
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_CURRENT_IMAGE: "dagster_user_code_image"
    networks:
      - depnetwork

  # This service runs dagit, which loads your user code from the user code container.
  # Since our instance uses the QueuedRunCoordinator, any runs submitted from dagit will be put on
  # a queue and later dequeued and launched by dagster-daemon.
  dagster_dagit:
    build:
      context: .
      dockerfile: ./container/dagster/Dockerfile
    entrypoint:
      - dagit
      - -h
      - "0.0.0.0"
      - -p
      - "3001"
      - -w
      - workspace.yaml
    container_name: dagster_dagit
    expose:
      - "3001"
    ports:
      - "3001:3001"
    environment:
      DAGSTER_POSTGRES_USER: "dagster"
      DAGSTER_POSTGRES_PASSWORD: "dagster"
      DAGSTER_POSTGRES_DB: "dep"
      DAGSTER_POSTGRES_HOSTNAME: "dep-db"
      DAGSTER_POSTGRES_PORT: "5432"
    volumes: # Make docker client accessible so we can terminate containers from dagit
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/io_manager_storage:/tmp/io_manager_storage
    networks:
      - depnetwork
    depends_on:
      - dagster_user_code

  # This service runs the dagster-daemon process, which is responsible for taking runs
  # off of the queue and launching them, as well as creating runs from schedules or sensors.
  dagster_daemon:
    build:
      context: .
      dockerfile: ./container/dagster/Dockerfile
    entrypoint:
      - dagster-daemon
      - run
    container_name: dagster_daemon
    restart: on-failure
    environment:
      DAGSTER_POSTGRES_USER: "dagster"
      DAGSTER_POSTGRES_PASSWORD: "dagster"
      DAGSTER_POSTGRES_DB: "dep"
      DAGSTER_POSTGRES_HOSTNAME: "dep-db"
      DAGSTER_POSTGRES_PORT: "5432"
      ENGAGEMENT_DB_USER: $ENGAGEMENT_DB_USER
      ENGAGEMENT_DB_PASSWORD: $ENGAGEMENT_DB_PASSWORD
      ENGAGEMENT_DB_DB: $ENGAGEMENT_DB_DB
      ENGAGEMENT_DB_HOST: $ENGAGEMENT_DB_HOST
      ENGAGEMENT_DB_PORT: $ENGAGEMENT_DB_PORT
      ANALYTICS_DB_USER: $ANALYTICS_DB_USER
      ANALYTICS_DB_PASSWORD: $ANALYTICS_DB_PASSWORD
      ANALYTICS_DB_DB: $ANALYTICS_DB_DB
      ANALYTICS_DB_HOST: $ANALYTICS_DB_HOST
      ANALYTICS_DB_PORT: $ANALYTICS_DB_PORT
    volumes: # Make docker client accessible so we can launch containers using host docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/io_manager_storage:/tmp/io_manager_storage
    networks:
      - depnetwork
    depends_on:
      - dagster_user_code

networks:
  depnetwork:
    external:
      name: depnetwork