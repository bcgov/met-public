kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: engagement-api
    role: api
spec:
  podSelector:
    matchLabels:
      app: engagement-api
      role: api
  policyTypes:
  - Ingress
  ingress:
  - from:
    # Allow from OpenShift router/ingress controller
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
    # Allow from engagement-cron (same app, different role)
    - podSelector:
        matchLabels:
          app: engagement-api
          role: cron
          app-group: engagement-app
  {{- range .Values.app.allowIngressPodselectors }}
    - podSelector:
        matchLabels:
{{ toYaml . | indent 10 }}
  {{- end }}