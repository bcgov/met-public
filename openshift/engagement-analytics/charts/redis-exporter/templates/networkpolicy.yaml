kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: engagement-analytics
    app-group: engagement-app
spec:
  podSelector:
    matchLabels:
      app: {{ .Chart.Name }}
      app-group: engagement-app
  policyTypes:
  - Ingress
  ingress:
  # Allow internal communication between engagement-analytics components
  - from:
    - podSelector:
        matchLabels:
          app: engagement-analytics
          app-group: engagement-app